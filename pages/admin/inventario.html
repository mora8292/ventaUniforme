<!DOCTYPE html>
<html>

<head>
    <title>Inventario</title>
    <link rel="stylesheet" href="../../assets/css/index.css">
    <link rel="stylesheet" href="../../assets/css/administrador.css">

    <style>
        .buscador-container {
            margin-bottom: 15px;
        }

        .buscador {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
        }

        .buscador:focus {
            border-color: #4a90e2;
        }

        .stock-bajo {
            background: #fff3cd !important;
            color: #856404;
            font-weight: bold;
        }

        .stock-critico {
            background: #f8d7da !important;
            color: #721c24;
            font-weight: bold;
        }

        .badge-stock {
            padding: 6px 10px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            display: inline-block;
            min-width: 60px;
            text-align: center;
        }

        .badge-normal {
            background: #d4edda;
            color: #155724;
        }

        .badge-bajo {
            background: #fff3cd;
            color: #856404;
        }

        .badge-critico {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>

<body>
    <div class="layout">

        <div class="menu-toggle" id="menuToggle">
            <img src="../../assets/icons/menu.png" alt="Menú">
        </div>

        <aside class="sidebar" id="sidebar">
            <h2>Menú</h2>
            <nav>
                <a href="./index.html">Inicio</a>
                <a href="./inventario.html">Inventario</a>
                <a href="./escuelas.html">Escuelas</a>
                <a href="./uniformes.html">Usuarios</a>
                <a href="./reportes.html">Reportes</a>
                <a href="" onclick="logout()">Cerrar sesion</a>
            </nav>
        </aside>

        <main class="main">
            <h1 style="text-align: center;">Inventario</h1>
            <br>

            <div class="card">
                <a href="./agregarInventario.html">
                    <button class="btn-primary"> + Agregar</button>
                </a>
            </div>

            <!-- 🔎 Buscador -->
            <div class="card buscador-container">
                <input type="text" id="buscadorInventario" class="buscador"
                    placeholder="Buscar uniforme, talla, escuela o categoría...">
            </div>

            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>Uniforme</th>
                            <th>Talla</th>
                            <th>Escuela</th>
                            <th>Categoría</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tablaInventario"></tbody>
                </table>
            </div>

        </main>
    </div>

    <script src="../../assets/js/script.js"></script>

    <!-- 🔒 PROTECCIÓN -->
    <script>
        const logged = localStorage.getItem("logged");
        const rol = localStorage.getItem("rol");

        if (!logged || rol !== "1") {
            window.location.href = "../../login.html";
        }

        function logout() {
            localStorage.clear();
            window.location.href = "../../login.html";
        }
    </script>

    <!-- 🔥 FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBj0V13o71naoJlqfDdah5Ob1I-cZskp8M",
            authDomain: "uniformes-calpus.firebaseapp.com",
            projectId: "uniformes-calpus",
            storageBucket: "uniformes-calpus.firebasestorage.app",
            messagingSenderId: "134191574166",
            appId: "1:134191574166:web:130c593447ffc5bfca26b7",
            measurementId: "G-7169TL6NG0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let inventarioGlobal = [];

        async function cargarInventario() {
            const categoriasSnap = await getDocs(collection(db, "categorias"));
            const categoriasMap = {};

            categoriasSnap.forEach(doc => {
                categoriasMap[doc.id] = doc.data().nombreCategoria;
            });

            const escuelasSnap = await getDocs(collection(db, "escuelas"));
            const escuelasMap = {};

            escuelasSnap.forEach(doc => {
                escuelasMap[doc.id] = doc.data().nombre;
            });

            const productosSnap = await getDocs(collection(db, "productos"));

            inventarioGlobal = [];

            productosSnap.forEach((docItem) => {
                const data = docItem.data();

                let nombreEscuela = "Sin escuela";

                if (Array.isArray(data.escuelasAsociadas) && data.escuelasAsociadas.length > 0) {
                    nombreEscuela = escuelasMap[data.escuelasAsociadas[0]] || "Sin escuela";
                }

                inventarioGlobal.push({
                    id: docItem.id,
                    nombre: data.nombre || "",
                    talla: data.talla || "",
                    escuela: nombreEscuela,
                    categoria: categoriasMap[data.idCategoria] || "Sin categoría",
                    precio: data.precioUnitario ?? 0,
                    stock: data.stock ?? 0
                });
            });

            renderInventario(inventarioGlobal);
        }

        function renderInventario(lista) {
            const tabla = document.getElementById("tablaInventario");
            tabla.innerHTML = "";

            if (lista.length === 0) {
                tabla.innerHTML = `
                    <tr>
                        <td colspan="7" style="text-align:center;">No se encontraron resultados</td>
                    </tr>
                `;
                return;
            }

            lista.forEach(item => {
                let claseFila = "";
                let badgeClass = "";

                if (item.stock <= 2) {
                    claseFila = "stock-critico";
                    badgeClass = "badge-critico";
                } else if (item.stock <= 5) {
                    claseFila = "stock-bajo";
                    badgeClass = "badge-bajo";
                } else {
                    badgeClass = "badge-normal";
                }

                const fila = `
                    <tr class="${claseFila}">
                        <td>${item.nombre}</td>
                        <td>${item.talla}</td>
                        <td>${item.escuela}</td>
                        <td>${item.categoria}</td>
                        <td>$${item.precio}</td>
                        <td>
                            <span class="badge-stock ${badgeClass}">
                                ${item.stock}
                            </span>
                        </td>
                        <td>
                            <button class="btn-editar" onclick="editar('${item.id}')">
                                <img src="../../assets/icons/editar24.png" alt="Editar">
                            </button>
                            <button class="btn-eliminar" onclick="eliminar('${item.id}')">
                                <img src="../../assets/icons/eliminar_1.png" alt="Eliminar">
                            </button>
                        </td>
                    </tr>
                `;

                tabla.innerHTML += fila;
            });
        }

        document.getElementById("buscadorInventario").addEventListener("input", (e) => {
            const texto = e.target.value.toLowerCase();

            const filtrados = inventarioGlobal.filter(item =>
                item.nombre.toLowerCase().includes(texto) ||
                item.talla.toLowerCase().includes(texto) ||
                item.escuela.toLowerCase().includes(texto) ||
                item.categoria.toLowerCase().includes(texto)
            );

            renderInventario(filtrados);
        });

        window.editar = function (id) {
            window.location.href = `./editarInventario.html?id=${id}`;
        }

        window.eliminar = async function (id) {
            if (!confirm("¿Eliminar producto?")) return;

            await deleteDoc(doc(db, "productos", id));
            cargarInventario();
        }

        cargarInventario();
    </script>

</body>

</html>
