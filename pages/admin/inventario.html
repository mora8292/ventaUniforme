<!DOCTYPE html>
<html>

<head>
    <title>Inventario</title>
    <link rel="stylesheet" href="../../assets/css/index.css">
    <link rel="stylesheet" href="../../assets/css/administrador.css">
</head>

<body>
    <div class="layout">

        <div class="menu-toggle" id="menuToggle">
            <img src="../../assets/icons/menu.png" alt="Menú">
        </div>

        <aside class="sidebar" id="sidebar">
            <h2>Menú</h2>
            <nav>
                <a href="./index.html">Inicio</a>
                <a href="./inventario.html">Inventario</a>
                <a href="./escuelas.html">Escuelas</a>
                <a href="./uniformes.html">Usuarios</a>
                <a href="./reportes.html">Reportes</a>
                <a href="" onclick="logout()">Cerrar sesion</a>
            </nav>
        </aside>

        <main class="main">
            <h1 style="text-align: center;">Inventario</h1>

            <div class="card">
                <a href="./agregarInventario.html">
                    <button class="btn-primary"> + Agregar</button>
                </a>
            </div>

            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>Uniforme</th>
                            <th>Talla</th>
                            <th>Categoría</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tablaInventario"></tbody>
                </table>
            </div>

        </main>
    </div>
    <script src="../../assets/js/script.js"></script>

    <!-- 🔒 PROTECCIÓN -->
    <script>
        const logged = localStorage.getItem("logged");
        const rol = localStorage.getItem("rol");

        if (!logged || rol !== "1") {
            window.location.href = "../../login.html";
        }

        function logout() {
            localStorage.clear();
            window.location.href = "../../login.html";
        }
    </script>

    <!-- 🔥 FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBj0V13o71naoJlqfDdah5Ob1I-cZskp8M",
            authDomain: "uniformes-calpus.firebaseapp.com",
            projectId: "uniformes-calpus",
            storageBucket: "uniformes-calpus.firebasestorage.app",
            messagingSenderId: "134191574166",
            appId: "1:134191574166:web:130c593447ffc5bfca26b7",
            measurementId: "G-7169TL6NG0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function cargarInventario() {
            const tabla = document.getElementById("tablaInventario");
            tabla.innerHTML = "";

            // 🔥 1. Cargar categorías
            const categoriasSnap = await getDocs(collection(db, "categorias"));
            const categoriasMap = {};

            categoriasSnap.forEach(doc => {
                categoriasMap[doc.id] = doc.data().nombreCategoria;
            });

            // 🔥 2. Cargar productos
            const productosSnap = await getDocs(collection(db, "productos"));

            productosSnap.forEach((docItem) => {
                const data = docItem.data();

                // 🔥 obtener nombre real de categoría
                const nombreCategoria = categoriasMap[data.idCategoria] || "Sin categoría";

                const fila = `
<tr>
    <td>${data.nombre}</td>
    <td>${data.talla}</td>
    <td>${nombreCategoria}</td>
    <td>$${data.precioUnitario ?? 0}</td>
    <td>${data.stock}</td>
    <td>
        <button class="btn-editar" onclick="editar('${docItem.id}')"><img src="../../assets/icons/editar24.png" alt="Editar"></button>
        <button class="btn-eliminar" onclick="eliminar('${docItem.id}')"><img src="../../assets/icons/eliminar_1.png" alt="Eliminar"></button>
    </td>
</tr>
    `;

                tabla.innerHTML += fila;
            });
        }

        window.editar = function (id) {
            window.location.href = `./editarInventario.html?id=${id}`;
        }

        window.eliminar = async function (id) {
            if (!confirm("¿Eliminar producto?")) return;

            await deleteDoc(doc(db, "productos", id));
            cargarInventario();
        }

        cargarInventario();
    </script>

</body>

</html>
