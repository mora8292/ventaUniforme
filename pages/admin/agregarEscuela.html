<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Agregar Escuela</title>
    <link rel="stylesheet" href="../../assets/css/administrador.css">
</head>

<body>

    <div class="main">
        <div class="form-card">
            <h2>Agregar Escuela</h2>

            <div class="form-group">
                <label>Nombre</label>
                <input type="text" id="nombre">
            </div>

            <div class="form-group">
                <label>Nivel</label>
                <select id="grado">
                    <option value="Primaria">Primaria</option>
                    <option value="Secundaria">Secundaria</option>
                    <option value="Preparatoria">Preparatoria</option>
                </select>
            </div>

            <div class="form-group">
                <label>Imagen</label>
                <input type="file" id="imagen" accept="image/jpeg,image/png,image/webp,image/gif,image/bmp">
            </div>

            <div class="form-buttons">
                <button class="btn-guardar" id="btnGuardar">Guardar</button>
                <button class="btn-cancelar" onclick="cancelar()">Cancelar</button>
            </div>

        </div>
    </div>

    <!-- 🔒 seguridad -->
    <script>
        const logged = localStorage.getItem("logged");
        const rol = localStorage.getItem("rol");

        if (!logged || rol !== "1") {
            window.location.href = "../../login.html";
        }

        function cancelar() {
            window.location.href = "./escuelas.html";
        }
    </script>

    <!-- 🔥 FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "uniformes-calpus.firebaseapp.com",
            projectId: "uniformes-calpus",
            storageBucket: "uniformes-calpus.firebasestorage.app",
            messagingSenderId: "134191574166",
            appId: "1:134191574166:web:130c593447ffc5bfca26b7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // 🔥 convertir a WEBP y redimensionar
        function convertirAWebp(file) {
            return new Promise((resolve) => {
                const img = new Image();
                const reader = new FileReader();

                reader.onload = (e) => {
                    img.src = e.target.result;
                };

                img.onload = () => {
                    const canvas = document.createElement("canvas");
                    const ctx = canvas.getContext("2d");

                    const size = 225; // 🔥 tamaño fijo

                    canvas.width = 460;
                    canvas.height = 390;

                    // 🔥 centrar y ajustar
                    ctx.drawImage(img, 0, 0, size, size);

                    canvas.toBlob((blob) => {
                        resolve(blob);
                    }, "image/webp", 0.8); // calidad 80%
                };

                reader.readAsDataURL(file);
            });
        }

        // 🚀 guardar
        document.getElementById("btnGuardar").addEventListener("click", async () => {

            const nombre = document.getElementById("nombre").value.trim();
            const grado = document.getElementById("grado").value;
            const file = document.getElementById("imagen").files[0];

            if (!nombre) {
                alert("Ingresa nombre");
                return;
            }

            try {
                let imgUrl = "";

                if (file) {
                    // 🔥 convertir imagen
                    const webpBlob = await convertirAWebp(file);

                    const nombreArchivo = "escuela_" + Date.now() + ".webp";

                    const storageRef = ref(storage, "escuelas/" + nombreArchivo);

                    await uploadBytes(storageRef, webpBlob);

                    imgUrl = await getDownloadURL(storageRef);
                }

                await addDoc(collection(db, "escuelas"), {
                    nombre,
                    grado,
                    imgUrl
                });

                alert("Escuela agregada correctamente");
                window.location.href = "./escuelas.html";

            } catch (error) {
                console.error(error);
                alert("Error al guardar");
            }
        });

    </script>

</body>

</html>
