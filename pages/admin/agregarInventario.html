<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../assets/css/administrador.css">
    <title>Agregar Inventario</title>
</head>

<body>
    <div class="main">

        <div class="form-card">
            <h2>Agregar Inventario</h2>

            <div class="form-group">
                <label>Uniforme</label>
                <input type="text" placeholder="Nombre del Uniforme">
            </div>

            <div class="form-group">
                <label>Talla</label>
                <select>
                    <option>CH</option>
                    <option>M</option>
                    <option>G</option>
                    <option>XG</option>
                </select>
            </div>

            <div class="form-group">
                <label>Stock</label>
                <input type="number" placeholder="Cantidad disponible">
            </div>

            <div class="form-buttons">
                <button class="btn-guardar">Guardar</button>
                <button class="btn-cancelar">Cancelar</button>
            </div>

        </div>

    </div>

</body>

</html>
