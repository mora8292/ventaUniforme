<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Agregar Inventario</title>
    <link rel="stylesheet" href="../../assets/css/administrador.css">
</head>

<body>

    <div class="main">

        <div class="form-card">
            <h2>Agregar Inventario</h2>

            <div class="form-group">
                <label>Uniforme</label>
                <input type="text" id="nombre">
            </div>

            <div class="form-group">
                <label>Talla</label>
                <select id="talla">
                    <option value="CH">CH</option>
                    <option value="M">M</option>
                    <option value="G">G</option>
                    <option value="XG">XG</option>
                </select>
            </div>

            <div class="form-group">
                <label>Escuela</label>
                <select id="escuela"></select>
            </div>

            <div class="form-group">
                <label>Categoría</label>
                <select id="categoria"></select>
            </div>

            <div class="form-group">
                <label>Imagen</label>
                <input type="file" id="imagen" accept="image/*">
            </div>

            <div class="form-group">
                <label>Stock</label>
                <input type="number" id="stock">
            </div>

            <div class="form-group">
                <label>Precio Unitario</label>
                <input type="number" id="precio">
            </div>

            <div class="form-buttons">
                <button class="btn-guardar" id="btnGuardar">Guardar</button>
                <button class="btn-cancelar" onclick="cancelar()">Cancelar</button>
            </div>

        </div>

    </div>

    <!-- 🔒 PROTECCIÓN -->
    <script>
        const logged = localStorage.getItem("logged");
        const rol = localStorage.getItem("rol");

        if (!logged || rol !== "1") {
            window.location.href = "../../login.html";
        }

        function cancelar() {
            window.location.href = "./inventario.html";
        }
    </script>

    <!-- 🔥 FIREBASE -->
    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import {
            getFirestore,
            collection,
            getDocs,
            addDoc
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        import {
            getStorage,
            ref,
            uploadBytes,
            getDownloadURL
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "uniformes-calpus.firebaseapp.com",
            projectId: "uniformes-calpus",
            storageBucket: "uniformes-calpus.firebasestorage.app",
            messagingSenderId: "134191574166",
            appId: "1:134191574166:web:130c593447ffc5bfca26b7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        function convertirAWebp(file) {
            return new Promise((resolve) => {
                const img = new Image();
                const reader = new FileReader();

                reader.onload = (e) => {
                    img.src = e.target.result;
                };

                img.onload = () => {
                    const canvas = document.createElement("canvas");
                    const ctx = canvas.getContext("2d");

                    const size = 225; // 🔥 tamaño fijo

                    canvas.width = size;
                    canvas.height = size;

                    // 🔥 centrar y ajustar
                    ctx.drawImage(img, 0, 0, size, size);

                    canvas.toBlob((blob) => {
                        resolve(blob);
                    }, "image/webp", 0.8); // calidad 80%
                };

                reader.readAsDataURL(file);
            });
        }

        // 🔽 cargar escuelas
        async function cargarEscuelas() {
            const select = document.getElementById("escuela");
            const snap = await getDocs(collection(db, "escuelas"));

            snap.forEach(doc => {
                const data = doc.data();
                select.innerHTML += `<option value="${doc.id}">${data.nombre}</option>`;
            });
        }

        // 🔽 cargar categorías
        async function cargarCategorias() {
            const select = document.getElementById("categoria");
            const snap = await getDocs(collection(db, "categorias"));

            snap.forEach(doc => {
                const data = doc.data();
                select.innerHTML += `<option value="${doc.id}">${data.nombreCategoria}</option>`;
            });
        }

        // 🚀 guardar producto
        document.getElementById("btnGuardar").addEventListener("click", async () => {

            const nombre = document.getElementById("nombre").value.trim();
            const talla = document.getElementById("talla").value;
            const escuela = document.getElementById("escuela").value;
            const categoria = document.getElementById("categoria").value;
            const stock = parseInt(document.getElementById("stock").value);
            const precio = parseFloat(document.getElementById("precio").value);
            const file = document.getElementById("imagen").files[0];

            if (!nombre || isNaN(stock) || isNaN(precio)) {
                alert("Completa los campos correctamente");
                return;
            }

            if (file && file.size > 2 * 1024 * 1024) {
                alert("Imagen muy pesada (máx 2MB)");
                return;
            }

            try {

                let imgUrl = "";

                if (file) {
                    const webpBlob = await convertirAWebp(file);

                    // 🔥 convertir a archivo real con tipo correcto
                    const webpFile = new File([webpBlob], `producto_${Date.now()}.webp`, {
                        type: "image/webp"
                    });

                    const storageRef = ref(storage, "productos/" + webpFile.name);

                    await uploadBytes(storageRef, webpFile);

                    imgUrl = await getDownloadURL(storageRef);
                }

                await addDoc(collection(db, "productos"), {
                    nombre,
                    talla,
                    stock,
                    precioUnitario: precio,
                    idCategoria: categoria,
                    escuelasAsociadas: [escuela],
                    imgUrl,
                    creadoPor: localStorage.getItem("user") || "",
                    fechaCreacion: new Date()
                });

                alert("Producto agregado correctamente");

                window.location.href = "./inventario.html";

            } catch (error) {
                console.error(error);
                alert("Error al guardar");
            }
        });

        cargarEscuelas();
        cargarCategorias();

    </script>

</body>

</html>
