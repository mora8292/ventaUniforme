<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ticket</title>
    <link rel="stylesheet" href="../../assets/css/administrador.css">
</head>

<body>

    <div class="main">

        <div class="form-card">
            <h2>Generar Ticket</h2>

            <div class="form-group">
                <label>Fecha</label>
                <input type="text" id="fecha" readonly>
            </div>

            <div class="card" style="margin-top:20px;">
                <h3>Productos</h3>

                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Uniforme</th>
                            <th>Talla</th>
                            <th>Cantidad</th>
                            <th>Precio</th>
                        </tr>
                    </thead>
                    <tbody id="tabla"></tbody>
                </table>
            </div>

            <div class="form-group">
                <label>Subtotal</label>
                <input type="text" id="subtotal" readonly>
            </div>

            <div class="form-group">
                <label>Método de pago</label>
                <select id="metodo">
                    <option value="Efectivo">Efectivo</option>
                    <option value="Tarjeta">Tarjeta</option>
                </select>
            </div>

            <div class="form-group">
                <label>Importe recibido</label>
                <input type="number" id="recibido">
            </div>

            <div class="form-group">
                <label>Cambio</label>
                <input type="text" id="cambio" readonly>
            </div>

            <div class="form-buttons">
                <button class="btn-guardar" id="btnGuardar">Finalizar Venta</button>
                <button class="btn-cancelar" onclick="cancelar()">Cancelar</button>
            </div>

        </div>

    </div>

    <!-- 🔥 FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import {
            getFirestore,
            collection,
            addDoc,
            doc,
            getDoc,
            updateDoc
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "uniformes-calpus.firebaseapp.com",
            projectId: "uniformes-calpus",
            storageBucket: "uniformes-calpus.firebasestorage.app",
            messagingSenderId: "134191574166",
            appId: "1:134191574166:web:130c593447ffc5bfca26b7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 🔒 proteger
        if (!localStorage.getItem("logged")) {
            window.location.href = "../../login.html";
        }

        // 🛒 carrito
        const carrito = JSON.parse(localStorage.getItem("carrito")) || [];
        const tabla = document.getElementById("tabla");

        let subtotal = 0;

        // 📅 fecha
        document.getElementById("fecha").value = new Date().toLocaleString();

        // 📦 mostrar productos
        carrito.forEach(p => {

            subtotal += p.precioUnitario * p.cantidad;

            tabla.innerHTML += `
        <tr>
            <td>${p.idProducto}</td>
            <td>${p.nombre}</td>
            <td>${p.talla}</td>
            <td>${p.cantidad}</td>
            <td>$${p.precioUnitario}</td>
        </tr>
    `;
        });

        document.getElementById("subtotal").value = "$" + subtotal;

        // 💰 calcular cambio
        document.getElementById("recibido").addEventListener("input", () => {
            const recibido = parseFloat(document.getElementById("recibido").value) || 0;
            const cambio = recibido - subtotal;

            document.getElementById("cambio").value = "$" + cambio;
        });

        // ❌ cancelar
        window.cancelar = () => {
            window.location.href = "./carrito.html";
        };

        // 🚀 finalizar venta
        document.getElementById("btnGuardar").addEventListener("click", async () => {

            const metodo = document.getElementById("metodo").value;
            const recibido = parseFloat(document.getElementById("recibido").value) || 0;

            if (recibido < subtotal) {
                alert("Dinero insuficiente");
                return;
            }

            try {

                // 🔥 VALIDAR STOCK
                for (const p of carrito) {

                    const ref = doc(db, "productos", p.idProducto);
                    const snap = await getDoc(ref);
                    const data = snap.data();

                    if (!data || data.stock < p.cantidad) {
                        alert(`Stock insuficiente para ${p.nombre}`);
                        return;
                    }
                }

                // 🔥 DESCONTAR STOCK
                for (const p of carrito) {

                    const ref = doc(db, "productos", p.idProducto);
                    const snap = await getDoc(ref);
                    const data = snap.data();

                    const nuevoStock = data.stock - p.cantidad;

                    await updateDoc(ref, {
                        stock: nuevoStock
                    });
                }

                // 💾 guardar venta
                await addDoc(collection(db, "ventas"), {
                    items: carrito.map(p => ({
                        idProducto: p.idProducto,
                        cantidad: p.cantidad,
                        precioUnitario: p.precioUnitario
                    })),
                    metodoPago: metodo,
                    dineroRecibido: recibido,
                    fechaVenta: new Date(),
                    idUsuario: localStorage.getItem("user") || ""
                });

                // 🧾 guardar ticket
                localStorage.setItem("ticketFinal", JSON.stringify({
                    carrito,
                    metodo,
                    recibido,
                    subtotal
                }));

                // 🧹 limpiar carrito
                localStorage.removeItem("carrito");

                // 🚀 REDIRECCIÓN FINAL
                window.location.href = "./ticketFinalizado.html";

            } catch (error) {
                console.error(error);
                alert("Error al procesar la venta");
            }
        });

    </script>

</body>

</html>
