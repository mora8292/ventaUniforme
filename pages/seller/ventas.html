<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Venta</title>
    <link rel="stylesheet" href="../../assets/css/index.css">
    <link rel="stylesheet" href="../../assets/css/ventas.css">
</head>

<body>

    <!-- ICONO CARRITO -->
    <div class="carrito-toggle">
        <a href="./carrito.html">
            <img src="../../assets/icons/carrito.png" alt="Carrito">
        </a>
    </div>

    <!-- MENÚ -->
    <div class="menu-toggle" id="menuToggle">
        <img src="../../assets/icons/menu.png" alt="Menú">
    </div>

    <aside class="sidebar" id="sidebar">
        <h2>Menú</h2>
        <nav>
            <a href="./index.html">Inicio</a>
            <a href="./escuelas.html">Escuelas</a>
            <a href="#" onclick="logout()">Cerrar sesión</a>
        </nav>
    </aside>

    <!-- CONTENIDO -->
    <div class="producto-container">

        <div class="producto-imagen">
            <img id="imgProducto" alt="Producto">
        </div>

        <div class="producto-info">

            <h1 id="nombreProducto"></h1>

            <p class="precio" id="precioProducto"></p>

            <!-- TALLAS -->
            <div class="tallas">
                <h3>Selecciona la talla:</h3>
                <div class="opciones-talla" id="tallasContainer"></div>
            </div>

            <!-- CANTIDAD -->
            <div class="tallas">
                <h3>Cantidad</h3>
                <input type="number" id="cantidad" value="1" min="1">
            </div>

            <br>

            <!-- BOTONES -->
            <div>
                <button id="btnVender" class="btn-comprar">Vender</button> <br><br>
                <button id="btnCarrito" class="btn-comprar">+ Agregar al carrito</button>
            </div>

        </div>
    </div>

    <script src="../../assets/js/script.js"></script>

    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import {
            getFirestore,
            collection,
            getDocs
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBj0V13o71naoJlqfDdah5Ob1I-cZskp8M",
            authDomain: "uniformes-calpus.firebaseapp.com",
            projectId: "uniformes-calpus",
            storageBucket: "uniformes-calpus.firebasestorage.app",
            messagingSenderId: "134191574166",
            appId: "1:134191574166:web:130c593447ffc5bfca26b7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const idProducto = params.get("idProducto");

        let productoBase;
        let tallas = [];
        let seleccion = null;

        // 🔥 cargar datos
        async function cargar() {

            const snap = await getDocs(collection(db, "productos"));

            snap.forEach(d => {
                if (d.id === idProducto) {
                    productoBase = { id: d.id, ...d.data() };
                }
            });

            snap.forEach(d => {
                const data = d.data();

                if (data.nombre === productoBase.nombre) {
                    tallas.push({
                        id: d.id,
                        talla: data.talla,
                        stock: data.stock,
                        precio: data.precioUnitario
                    });
                }
            });

            pintar();
        }

        // 🎨 pintar UI
        function pintar() {

            document.getElementById("nombreProducto").textContent = productoBase.nombre;
            document.getElementById("precioProducto").textContent = "$" + productoBase.precioUnitario;
            document.getElementById("imgProducto").src = productoBase.imgUrl;

            const cont = document.getElementById("tallasContainer");
            cont.innerHTML = ""; // ⚠️ evita duplicados

            tallas.forEach(t => {

                const btn = document.createElement("button");
                btn.textContent = t.talla;
                btn.classList.add("talla");

                if (t.stock <= 0) btn.disabled = true;

                btn.onclick = () => {
                    seleccion = t;
                    document.getElementById("cantidad").max = t.stock;
                };

                cont.appendChild(btn);
            });
        }

        // 🛒 agregar al carrito
        document.getElementById("btnCarrito").addEventListener("click", () => {

            if (!seleccion) return alert("Selecciona talla");

            const cantidad = parseInt(document.getElementById("cantidad").value);

            if (cantidad <= 0 || cantidad > seleccion.stock) {
                return alert("Cantidad inválida");
            }

            let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

            carrito.push({
                idProducto: seleccion.id,
                nombre: productoBase.nombre,
                talla: seleccion.talla,
                precioUnitario: seleccion.precio,
                cantidad,
                imgUrl: productoBase.imgUrl
            });

            localStorage.setItem("carrito", JSON.stringify(carrito));

            alert("Agregado al carrito");
        });

        // 💰 vender directo
        document.getElementById("btnVender").addEventListener("click", () => {

            if (!seleccion) return alert("Selecciona talla");

            const cantidad = parseInt(document.getElementById("cantidad").value);

            if (cantidad <= 0 || cantidad > seleccion.stock) {
                return alert(`Stock insuficiente. Disponible: ${seleccion.stock}`);
            }

            const carritoTemp = [{
                idProducto: seleccion.id,
                nombre: productoBase.nombre,
                talla: seleccion.talla,
                precioUnitario: seleccion.precio,
                cantidad,
                imgUrl: productoBase.imgUrl
            }];

            localStorage.setItem("carrito", JSON.stringify(carritoTemp));

            window.location.href = "./ticket.html";
        });

        cargar();

    </script>

</body>

</html>
