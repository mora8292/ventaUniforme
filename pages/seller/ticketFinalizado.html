<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ticket Finalizado</title>
    <link rel="stylesheet" href="../../assets/css/administrador.css">
</head>

<body>

    <div class="main">

        <div class="form-card">
            <h2>Ticket Generado</h2>

            <p id="fecha"></p>

            <div class="card">
                <h3>Productos</h3>

                <table>
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Talla</th>
                            <th>Cantidad</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody id="tabla"></tbody>
                </table>
            </div>

            <div class="form-group">
                <label>Subtotal</label>
                <input type="text" id="subtotal" readonly>
            </div>

            <div class="form-group">
                <label>Método de pago</label>
                <input type="text" id="metodo" readonly>
            </div>

            <div class="form-group">
                <label>Recibido</label>
                <input type="text" id="recibido" readonly>
            </div>

            <div class="form-group">
                <label>Cambio</label>
                <input type="text" id="cambio" readonly>
            </div>

            <div class="form-buttons">
                <button class="btn-guardar" onclick="imprimir()">Imprimir</button>
                <button class="btn-cancelar" onclick="volver()">Finalizar</button>
            </div>

        </div>

    </div>

    <script>

        // 🔥 obtener datos
        const data = JSON.parse(localStorage.getItem("ticketFinal"));

        // ❌ si no hay datos
        if (!data) {
            alert("No hay ticket");
            window.location.href = "./index.html";
        }

        // 📅 fecha
        document.getElementById("fecha").innerText = new Date().toLocaleString();

        const tabla = document.getElementById("tabla");

        let subtotal = 0;

        // 📦 recorrer carrito
        data.carrito.forEach(p => {

            const total = p.precioUnitario * p.cantidad;
            subtotal += total;

            tabla.innerHTML += `
        <tr>
            <td>${p.nombre}</td>
            <td>${p.talla}</td>
            <td>${p.cantidad}</td>
            <td>$${total}</td>
        </tr>
    `;
        });

        // 💰 datos
        document.getElementById("subtotal").value = "$" + data.subtotal;
        document.getElementById("metodo").value = data.metodo;
        document.getElementById("recibido").value = "$" + data.recibido;

        const cambio = data.recibido - data.subtotal;
        document.getElementById("cambio").value = "$" + cambio;

        // 🖨️ imprimir
        function imprimir() {
            window.print();
        }

        // 🔙 volver
        function volver() {
            localStorage.removeItem("ticketFinal");
            window.location.href = "./index.html";
        }

    </script>

</body>

</html>
