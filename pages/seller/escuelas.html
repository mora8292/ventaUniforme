<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Escuelas</title>
    <link rel="stylesheet" href="../../assets/css/index.css">
    <link rel="stylesheet" href="../../assets/css/escuelas.css">
</head>

<body>

    <!-- 🔘 MENÚ -->
    <div class="menu-toggle" id="menuToggle">
        <img src="../../assets/icons/menu.png" alt="Menú">
    </div>

    <aside class="sidebar" id="sidebar">
        <h2>Menú</h2>
        <nav>
            <a href="./index.html">Inicio</a>
            <a href="./escuelas.html">Escuelas</a>
            <a href="#">Contacto</a>
        </nav>
    </aside>

    <!-- 🔍 BUSCADOR -->
    <div class="contenedor-busqueda">
        <div class="barra-busqueda">
            <input type="text" id="busqueda" placeholder="Buscar escuela">
        </div>

        <div class="filtros">
            <button class="filtro-btn" data-filtro="preparatoria">Preparatoria</button>
            <button class="filtro-btn" data-filtro="secundaria">Secundaria</button>
            <button class="filtro-btn" data-filtro="primaria">Primaria</button>
        </div>
    </div>

    <!-- 🛒 CARRITO -->
    <div class="carrito-toggle">
        <a href="./carrito.html">
            <img src="../../assets/icons/carrito.png">
        </a>
    </div>

    <!-- 📦 CONTENIDO -->
    <main class="contenido-escuelas">
        <h1>Escuelas</h1>
        <p>Seleccione una escuela para ver sus uniformes disponibles.</p>

        <div class="grid-escudos" id="gridEscuelas"></div>
    </main>

    <script src="../../assets/js/script.js"></script>
    <script>
        const logged = localStorage.getItem("logged");
        const rol = localStorage.getItem("rol");

        // ❌ no ha iniciado sesión
        if (!logged) {
            window.location.href = "../../login.html";
        }
        function logout() {
            localStorage.clear();
            window.location.href = "../../login.html";
        }
    </script>
    <!-- 🔥 FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import {
            getFirestore,
            collection,
            getDocs
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_AUTH_DOMAIN",
            projectId: "uniformes-calpus"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let escuelas = [];

        // 🚀 cargar escuelas
        async function cargarEscuelas() {
            const contenedor = document.getElementById("gridEscuelas");
            contenedor.innerHTML = "";

            const snap = await getDocs(collection(db, "escuelas"));

            escuelas = [];

            snap.forEach(doc => {
                const data = doc.data();

                const escuela = {
                    id: doc.id,
                    nombre: data.nombre || "Sin nombre",
                    grado: (data.grado || "").toLowerCase(),
                    img: data.imgUrl || "../../assets/img/default.jpg"
                };

                escuelas.push(escuela);
            });

            renderEscuelas(escuelas);
        }

        // 🔄 render
        function renderEscuelas(lista) {
            const contenedor = document.getElementById("gridEscuelas");
            contenedor.innerHTML = "";

            lista.forEach(e => {
                contenedor.innerHTML += `
                    <a href="./uniformes.html?id=${e.id}" 
                       class="escudo-card ${e.grado}">
                        
                        <img src="${e.img}" alt="${e.nombre}">
                        <span>${e.nombre}</span>
                    </a>
                `;
            });
        }

        // 🔍 búsqueda
        document.getElementById("busqueda").addEventListener("input", (e) => {
            const texto = e.target.value.toLowerCase();

            const filtradas = escuelas.filter(e =>
                e.nombre.toLowerCase().includes(texto)
            );

            renderEscuelas(filtradas);
        });

        // 🎯 filtros
        document.querySelectorAll(".filtro-btn").forEach(btn => {
            btn.addEventListener("click", () => {

                const tipo = btn.dataset.filtro;

                const filtradas = escuelas.filter(e =>
                    e.grado.includes(tipo)
                );

                renderEscuelas(filtradas);
            });
        });

        // 🔥 iniciar
        cargarEscuelas();
    </script>

</body>

</html>
