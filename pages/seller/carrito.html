<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Carrito</title>
    <link rel="stylesheet" href="../../assets/css/index.css">
</head>

<body>

    <h1>Carrito</h1>

    <div id="listaProductos"></div>

    <h2 id="total"></h2>

    <button onclick="irATicket()">Finalizar Venta</button>

    <script>

        let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

        function render() {

            const lista = document.getElementById("listaProductos");
            const totalHTML = document.getElementById("total");

            lista.innerHTML = "";

            let total = 0;

            carrito.forEach((p, i) => {

                total += p.precioUnitario * p.cantidad;

                lista.innerHTML += `
            <div>
                <img src="${p.imgUrl}" width="80">
                <h3>${p.nombre}</h3>
                <p>Talla: ${p.talla}</p>
                <p>Cantidad: ${p.cantidad}</p>
                <p>$${p.precioUnitario}</p>
                <button onclick="eliminar(${i})">Eliminar</button>
            </div>
        `;
            });

            totalHTML.textContent = "Total: $" + total;
        }

        function eliminar(i) {
            carrito.splice(i, 1);
            localStorage.setItem("carrito", JSON.stringify(carrito));
            render();
        }

        // 🚀 IR AL TICKET
        function irATicket() {

            if (carrito.length === 0) {
                return alert("Carrito vacío");
            }

            localStorage.setItem("ticket", JSON.stringify(carrito));

            window.location.href = "./ticket.html";
        }

        render();

    </script>

</body>

</html>
