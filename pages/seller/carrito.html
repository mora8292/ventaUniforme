<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Carrito</title>
    <link rel="stylesheet" href="../../assets/css/index.css">
    <link rel="stylesheet" href="../../assets/css/carrito.css">
</head>

<body>

    <!-- MENÚ -->
    <div class="menu-toggle" id="menuToggle">
        <img src="../../assets/icons/menu.png" alt="Menú">
    </div>

    <aside class="sidebar" id="sidebar">
        <h2>Menú</h2>
        <nav>
            <a href="./index.html">Inicio</a>
            <a href="./escuelas.html">Escuelas</a>
            <a href="#">Contacto</a>
        </nav>
    </aside>

    <!-- ICONO CARRITO -->
    <div class="carrito-toggle">    
        <a href="./carrito.html">
            <img src="../../assets/icons/carrito.png" alt="Carrito">
        </a>
    </div>

    <!-- CONTENEDOR PRINCIPAL -->
    <div class="carrito-container">

        <h1>Carrito de Venta</h1>

        <!-- LISTA DINÁMICA -->
        <div class="lista-productos" id="listaProductos"></div>

        <!-- RESUMEN -->
        <div class="resumen-carrito">
            <h2 id="total"></h2>

            <button class="btn-finalizar" onclick="irATicket()">
                Finalizar Venta
            </button>
        </div>

    </div>

    <script src="../../assets/js/script.js"></script>

    <script>

        let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

        function render() {

            const lista = document.getElementById("listaProductos");
            const totalHTML = document.getElementById("total");

            lista.innerHTML = "";

            let total = 0;

            carrito.forEach((p, i) => {

                total += p.precioUnitario * p.cantidad;

                lista.innerHTML += `
                <div class="producto-carrito">

                    <img src="${p.imgUrl}" alt="${p.nombre}">

                    <div class="info-producto">
                        <h3>${p.nombre}</h3>
                        <p>Talla: ${p.talla}</p>
                        <p>Cantidad: ${p.cantidad}</p>
                        <p class="precio">$${p.precioUnitario}</p>
                    </div>

                    <button class="btn-eliminar" onclick="eliminar(${i})">
                        <img src="../../assets/icons/eliminar_1.png" alt="Eliminar">
                    </button>

                </div>
                `;
            });

            totalHTML.textContent = "Total: $" + total;
        }

        function eliminar(i) {
            carrito.splice(i, 1);
            localStorage.setItem("carrito", JSON.stringify(carrito));
            render();
        }

        function irATicket() {

            if (carrito.length === 0) {
                return alert("Carrito vacío");
            }

            localStorage.setItem("ticket", JSON.stringify(carrito));
            window.location.href = "./ticket.html";
        }

        render();

    </script>

</body>

</html>
