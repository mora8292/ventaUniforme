<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../estilos/administrador.css">
    <title>Agregar Uniforme</title>
</head>

<body>
    <div class="main">

        <div class="form-card">
            <h2>Agregar Uniforme</h2>

            <div class="form-group">
                <label>Nombre del uniforme</label>
                <input type="text" placeholder="Ingrese nombre del uniforme">
            </div>

            <div class="form-group">
                <label>Escuela</label>
                <select>
                    <option>Seleccione una escuela</option>
                    <option>CBTis 154</option>
                </select>
            </div>

            <div class="form-group">
                <label>Precio</label>
                <input type="number" placeholder="Ingrese precio">
            </div>

            <div class="form-buttons">
                <button class="btn-guardar">Guardar</button>
                <button class="btn-cancelar">Cancelar</button>
            </div>

        </div>

    </div>

</body>

</html>
