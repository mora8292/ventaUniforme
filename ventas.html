<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venta</title>
    <link rel="stylesheet" href="./estilos/index.css">
    <link rel="stylesheet" href="./estilos/ventas.css">
</head>

<body>
    
    <div class="carrito-toggle">    
        <a href="./carrito.html">
            <img src="./icons/carrito.png" alt="Menú">
        </a>
    </div>

    <div class="menu-toggle" id="menuToggle">
        <img src="./icons/menu.png" alt="Menú">
    </div>

    <aside class="sidebar" id="sidebar">
        <h2>Menú</h2>
        <nav>
            <a href="./index.html">Inicio</a>

    <div class="producto-container">

        <div class="producto-imagen">
            <img src="./img/uniforme1.jpg" alt="Uniforme CBTis">
        </div>

        <div class="producto-info">

            <h1>Uniforme CBTis No. 154</h1>

            <p class="precio">$850 MXN</p>

                    <button class="talla">G</button>

            </div>
            <div>
            <button class="btn-comprar">Vender</button>
